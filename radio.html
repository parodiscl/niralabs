<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nira Radio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --alpha: #00D4FF;
      --theta: #A78BFA;
      --delta: #34D399;
      --navy:  #0A0F1C;
      --text:  #E8ECF0;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Space Grotesk', sans-serif;
      background: #000;
      color: var(--text);
    }

    /* ── Video fondo ── */
    #radioBg {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center;
      z-index: 0;
      opacity: 0;
      transition: opacity 1.4s ease;
    }
    #radioBg.loaded { opacity: 1; }

    /* ── Overlays ── */
    #overlayBase {
      position: fixed; inset: 0; z-index: 1;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.55) 0%,
        rgba(0,0,0,0.25) 40%,
        rgba(0,0,0,0.65) 75%,
        rgba(0,0,0,0.92) 100%
      );
    }

    #overlayColor {
      position: fixed; inset: 0; z-index: 2;
      background: radial-gradient(ellipse 70% 50% at 50% 100%, rgba(0,212,255,0.15) 0%, transparent 70%);
      transition: background 1.2s ease;
      pointer-events: none;
    }
    body.theta #overlayColor { background: radial-gradient(ellipse 70% 50% at 50% 100%, rgba(167,139,250,0.18) 0%, transparent 70%); }
    body.delta #overlayColor { background: radial-gradient(ellipse 70% 50% at 50% 100%, rgba(52,211,153,0.15) 0%, transparent 70%); }

    /* ── Canvas olas ── */
    #waveCanvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 3;
    }

    /* ── Ruido ── */
    #noise {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 4;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px;
    }

    /* ── Layout ── */
    .page {
      position: relative; z-index: 10;
      width: 100%; height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 28px 36px 36px;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .back-link {
      display: flex; align-items: center; gap: 7px;
      font-size: 13px; font-weight: 500;
      color: rgba(232,236,240,0.45);
      text-decoration: none;
      letter-spacing: 0.02em;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--text); }
    .back-link svg { width: 14px; height: 14px; }

    .wordmark {
      font-size: 17px; font-weight: 700;
      letter-spacing: -0.5px; text-decoration: none;
    }
    .wm-nira { color: var(--text); }
    .wm-l { color: var(--alpha); }
    .wm-a { color: var(--theta); }
    .wm-b { color: #F472B6; }
    .wm-s { color: var(--delta); }

    .live-badge {
      display: flex; align-items: center; gap: 7px;
      font-size: 10px; font-weight: 600;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: rgba(232,236,240,0.3);
    }
    .live-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--alpha);
      transition: background 0.8s ease;
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink {
      0%,100% { opacity:1; }
      50% { opacity:0.3; }
    }

    /* ── Centro ── */
    .center {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .radio-eyebrow {
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.28em; text-transform: uppercase;
      color: rgba(232,236,240,0.22);
      margin-bottom: 20px;
    }

    #stationName {
      font-size: clamp(56px, 10vw, 130px);
      font-weight: 700;
      letter-spacing: -3px;
      line-height: 1;
      color: #fff;
      margin-bottom: 14px;
      transition: opacity 0.25s ease;
    }

    #stationTagline {
      font-size: clamp(14px, 1.5vw, 17px);
      font-weight: 400;
      color: rgba(232,236,240,0.38);
      margin-bottom: 36px;
      text-align: center;
      max-width: 380px;
      line-height: 1.55;
      transition: opacity 0.25s ease;
      min-height: 2.8em;
    }

    /* Embed Spotify */
    .embed-wrap {
      width: 100%; max-width: 400px;
      opacity: 0; transform: translateY(14px);
      transition: opacity 0.55s ease 0.25s, transform 0.55s ease 0.25s;
    }
    .embed-wrap.visible { opacity: 1; transform: translateY(0); }
    .embed-wrap iframe {
      width: 100%; height: 152px;
      border: none; border-radius: 14px; display: block;
    }

    /* ── Selector ── */
    .station-selector {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .station-btn {
      display: flex; align-items: center; gap: 9px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 100px;
      padding: 11px 22px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Space Grotesk', sans-serif;
      color: rgba(232,236,240,0.45);
      font-size: 14px; font-weight: 600;
      letter-spacing: 0.01em;
      backdrop-filter: blur(8px);
    }
    .station-btn .g {
      font-size: 19px; font-weight: 700; line-height: 1;
      transition: color 0.3s;
    }
    .station-btn[data-s="alpha"] { --c: var(--alpha); }
    .station-btn[data-s="theta"] { --c: var(--theta); }
    .station-btn[data-s="delta"] { --c: var(--delta); }

    .station-btn:hover {
      background: rgba(255,255,255,0.09);
      border-color: rgba(255,255,255,0.2);
      color: var(--text);
    }
    .station-btn.active {
      border-color: var(--c);
      color: var(--text);
      background: rgba(255,255,255,0.07);
      box-shadow: 0 0 28px -10px var(--c);
    }
    .station-btn.active .g { color: var(--c); }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      .page { padding: 20px 20px 28px; }
      #stationName { letter-spacing: -2px; }
      .station-selector { gap: 8px; }
      .station-btn { padding: 10px 16px; font-size: 13px; }
      .station-btn .g { font-size: 16px; }
      .embed-wrap { max-width: 100%; }
    }
  </style>
</head>
<body class="alpha">

  <video id="radioBg" autoplay muted loop playsinline></video>
  <div id="overlayBase"></div>
  <div id="overlayColor"></div>
  <canvas id="waveCanvas"></canvas>
  <div id="noise"></div>

  <div class="page">

    <header>
      <a href="index.html" class="back-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        volver
      </a>
      <a href="index.html" class="wordmark">
        <span class="wm-nira">nira</span><span class="wm-l">l</span><span class="wm-a">a</span><span class="wm-b">b</span><span class="wm-s">s</span>
      </a>
      <div class="live-badge">
        <div class="live-dot" id="liveDot"></div>
        en vivo
      </div>
    </header>

    <div class="center">
      <p class="radio-eyebrow">nira radio</p>
      <div id="stationName"></div>
      <p id="stationTagline"></p>
      <div class="embed-wrap" id="embedWrap">
        <iframe id="spotifyEmbed" src=""
          allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
          loading="lazy">
        </iframe>
      </div>
    </div>

    <div class="station-selector">
      <button class="station-btn" data-s="alpha">
        <span class="g">α</span> Alpha
      </button>
      <button class="station-btn" data-s="theta">
        <span class="g">θ</span> Theta
      </button>
      <button class="station-btn" data-s="delta">
        <span class="g">δ</span> Delta
      </button>
    </div>

  </div>

  <script>
  // ── Video background aleatorio ───────────────────────
  const videos = ['radio-bg1.mp4','radio-bg2.mp4'];
  const bgVideo = document.getElementById('radioBg');
  bgVideo.src = videos[Math.floor(Math.random() * videos.length)];
  bgVideo.addEventListener('canplay', () => bgVideo.classList.add('loaded'), { once: true });

  // ── Estaciones ───────────────────────────────────────
  const STATIONS = {
    alpha: { name:'Alpha', tagline:'Foco profundo. Para cuando construyes algo que importa.', greek:'α', color:'#00D4FF', list:'37i9dQZF1DWZeKCadgRdKQ' },
    theta: { name:'Theta', tagline:'Flujo creativo. Las ideas emergen cuando la mente viaja.', greek:'θ', color:'#A78BFA', list:'37i9dQZF1DWXLeA8Omikj7' },
    delta: { name:'Delta', tagline:'Descanso activo. El cerebro también procesa en silencio.', greek:'δ', color:'#34D399', list:'37i9dQZF1DX4sWSpwq3LiO' }
  };

  let current = null;
  const nameEl    = document.getElementById('stationName');
  const taglineEl = document.getElementById('stationTagline');
  const embedWrap = document.getElementById('embedWrap');
  const embedEl   = document.getElementById('spotifyEmbed');
  const liveDot   = document.getElementById('liveDot');

  nameEl.style.transition    = 'opacity .25s ease';
  taglineEl.style.transition = 'opacity .25s ease';

  function switchStation(key) {
    if (key === current) return;
    current = key;
    const s = STATIONS[key];

    document.body.className = key;
    liveDot.style.background = s.color;
    waveColor = s.color;

    nameEl.style.opacity = taglineEl.style.opacity = '0';
    setTimeout(() => {
      nameEl.textContent    = s.name;
      taglineEl.textContent = s.tagline;
      nameEl.style.opacity = taglineEl.style.opacity = '1';
    }, 200);

    embedWrap.classList.remove('visible');
    setTimeout(() => {
      embedEl.src = `https://open.spotify.com/embed/playlist/${s.list}?utm_source=generator&theme=0`;
      embedWrap.classList.add('visible');
    }, 320);

    document.querySelectorAll('.station-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.s === key)
    );
  }

  document.querySelectorAll('.station-btn').forEach(b =>
    b.addEventListener('click', () => switchStation(b.dataset.s))
  );
  switchStation('alpha');

  // ── Canvas waveform ─────────────────────────────────
  const canvas = document.getElementById('waveCanvas');
  const ctx    = canvas.getContext('2d');
  let W, H, waveColor = '#00D4FF', t = 0;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  function hexRgb(h) {
    return [
      parseInt(h.slice(1,3),16),
      parseInt(h.slice(3,5),16),
      parseInt(h.slice(5,7),16)
    ];
  }

  function draw() {
    ctx.clearRect(0,0,W,H);
    const [r,g,b] = hexRgb(waveColor);

    for (let l = 0; l < 5; l++) {
      const amp   = H * 0.035 * (1 - l * 0.15);
      const freq  = 0.0038 + l * 0.0014;
      const speed = 0.55 + l * 0.28;
      const yBase = H * 0.65 + l * 16;
      const alpha = 0.055 - l * 0.009;

      ctx.beginPath();
      ctx.moveTo(0, yBase);
      for (let x = 0; x <= W; x += 4) {
        const y = yBase
          + Math.sin(x * freq + t * speed) * amp
          + Math.sin(x * freq * 1.8 + t * speed * 0.6) * (amp * 0.35);
        ctx.lineTo(x, y);
      }
      ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath();
      ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
      ctx.fill();

      // línea de cresta
      ctx.beginPath();
      ctx.moveTo(0, yBase);
      for (let x = 0; x <= W; x += 4) {
        const y = yBase
          + Math.sin(x * freq + t * speed) * amp
          + Math.sin(x * freq * 1.8 + t * speed * 0.6) * (amp * 0.35);
        ctx.lineTo(x, y);
      }
      ctx.strokeStyle = `rgba(${r},${g},${b},${alpha * 2.8})`;
      ctx.lineWidth   = 1;
      ctx.stroke();
    }
    t += 0.011;
    requestAnimationFrame(draw);
  }
  draw();
  </script>
</body>
</html>
