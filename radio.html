<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nira Radio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --c-alpha: #00D4FF;
      --c-theta: #A78BFA;
      --c-delta: #34D399;
      --navy:    #0A0F1C;
      --text:    #E8ECF0;
      --active:  #00D4FF;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Space Grotesk', sans-serif;
      background: var(--navy);
      color: var(--text);
    }

    /* ─────────────────────────────────────
       FONDOS
    ───────────────────────────────────── */

    /* Gradiente radial que respira */
    #glow {
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse 90% 70% at 50% 105%, rgba(0,212,255,.22) 0%, transparent 65%);
      transition: background 1.4s cubic-bezier(.4,0,.2,1);
      pointer-events: none;
    }

    /* Segundo glow superior sutil */
    #glow2 {
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse 60% 40% at 80% -10%, rgba(0,212,255,.07) 0%, transparent 60%);
      transition: background 1.4s cubic-bezier(.4,0,.2,1);
      pointer-events: none;
    }

    body[data-s="alpha"] #glow  { background: radial-gradient(ellipse 90% 70% at 50% 105%, rgba(0,212,255,.22)  0%, transparent 65%); }
    body[data-s="alpha"] #glow2 { background: radial-gradient(ellipse 60% 40% at 80% -10%, rgba(0,212,255,.07)  0%, transparent 60%); }

    body[data-s="theta"] #glow  { background: radial-gradient(ellipse 90% 70% at 50% 105%, rgba(167,139,250,.22) 0%, transparent 65%); }
    body[data-s="theta"] #glow2 { background: radial-gradient(ellipse 60% 40% at 20% -10%, rgba(167,139,250,.09) 0%, transparent 60%); }

    body[data-s="delta"] #glow  { background: radial-gradient(ellipse 90% 70% at 50% 105%, rgba(52,211,153,.20)  0%, transparent 65%); }
    body[data-s="delta"] #glow2 { background: radial-gradient(ellipse 60% 40% at 60% -10%, rgba(52,211,153,.07)  0%, transparent 60%); }

    /* Canvas olas */
    #cv {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 1;
    }

    /* Ruido */
    #noise {
      position: fixed; inset: 0; z-index: 2;
      pointer-events: none; opacity: .032;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px;
    }

    /* Símbolo griego gigante */
    #greek {
      position: fixed;
      right: -2vw; bottom: -8vh;
      font-size: clamp(280px, 38vw, 520px);
      font-weight: 700; line-height: 1;
      letter-spacing: -10px;
      pointer-events: none; z-index: 3;
      user-select: none;
      opacity: 0;
      transform: translateY(30px) scale(.96);
      transition: opacity 1s ease, transform 1s ease, color 1s ease;
      color: var(--active);
    }
    #greek.show { opacity: .055; transform: translateY(0) scale(1); }

    /* ─────────────────────────────────────
       LAYOUT
    ───────────────────────────────────── */
    .page {
      position: relative; z-index: 10;
      width: 100%; height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 28px 40px 40px;
    }

    /* ── Header ── */
    header {
      display: flex; align-items: center;
      justify-content: space-between;
    }

    .back {
      display: flex; align-items: center; gap: 7px;
      font-size: 12px; font-weight: 500;
      letter-spacing: .04em;
      color: rgba(232,236,240,.35);
      text-decoration: none;
      transition: color .2s;
    }
    .back:hover { color: var(--text); }
    .back svg { width: 13px; height: 13px; }

    .wm { font-size: 17px; font-weight: 700; letter-spacing: -.5px; text-decoration: none; }
    .wm-n { color: var(--text); }
    .wm-l { color: var(--c-alpha); }
    .wm-a { color: var(--c-theta); }
    .wm-b { color: #F472B6; }
    .wm-s { color: var(--c-delta); }

    .badge-live {
      display: flex; align-items: center; gap: 7px;
      font-size: 10px; font-weight: 600;
      letter-spacing: .18em; text-transform: uppercase;
      color: rgba(232,236,240,.28);
    }
    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--active);
      transition: background .8s ease;
      animation: blink 2.4s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

    /* ── Centro ── */
    .mid {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }

    .eyebrow {
      font-size: 10px; font-weight: 600;
      letter-spacing: .3em; text-transform: uppercase;
      color: rgba(232,236,240,.18);
      margin-bottom: 18px;
    }

    #sName {
      font-size: clamp(64px, 11vw, 140px);
      font-weight: 700; letter-spacing: -4px; line-height: 1;
      color: #fff; margin-bottom: 14px;
      transition: opacity .22s ease;
    }

    #sTagline {
      font-size: clamp(14px, 1.4vw, 17px); font-weight: 400;
      color: rgba(232,236,240,.36);
      margin-bottom: 38px;
      text-align: center; max-width: 360px; line-height: 1.6;
      transition: opacity .22s ease;
      min-height: 3em;
    }

    /* Embed */
    .embed {
      width: 100%; max-width: 400px;
      opacity: 0; transform: translateY(16px);
      transition: opacity .5s ease .28s, transform .5s ease .28s;
    }
    .embed.on { opacity: 1; transform: translateY(0); }
    .embed iframe {
      width: 100%; height: 152px;
      border: none; border-radius: 14px; display: block;
    }

    /* ── Selector ── */
    .sel {
      display: flex; align-items: center;
      justify-content: center; gap: 10px;
    }

    .btn {
      display: flex; align-items: center; gap: 9px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.09);
      border-radius: 100px;
      padding: 12px 24px;
      cursor: pointer;
      transition: all .3s ease;
      font-family: 'Space Grotesk', sans-serif;
      color: rgba(232,236,240,.42);
      font-size: 14px; font-weight: 600;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .btn .g { font-size: 20px; font-weight: 700; line-height: 1; transition: color .3s; }

    .btn:hover {
      background: rgba(255,255,255,.08);
      border-color: rgba(255,255,255,.18);
      color: var(--text);
    }
    .btn[data-s="alpha"] { --bc: var(--c-alpha); }
    .btn[data-s="theta"] { --bc: var(--c-theta); }
    .btn[data-s="delta"] { --bc: var(--c-delta); }

    .btn.on {
      border-color: var(--bc);
      color: var(--text);
      background: rgba(255,255,255,.06);
      box-shadow: 0 0 30px -10px var(--bc), inset 0 0 20px -14px var(--bc);
    }
    .btn.on .g { color: var(--bc); }

    /* frecuencia label bajo el selector */
    #freqLabel {
      text-align: center;
      margin-top: 14px;
      font-size: 10px; font-weight: 500;
      letter-spacing: .2em; text-transform: uppercase;
      color: rgba(232,236,240,.15);
      transition: color .4s ease;
    }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      .page { padding: 20px 20px 30px; }
      #sName { letter-spacing: -2px; }
      #greek { font-size: 200px; }
      .btn { padding: 10px 16px; font-size: 13px; }
      .btn .g { font-size: 17px; }
      .embed { max-width: 100%; }
    }
  </style>
</head>
<body data-s="alpha">

  <div id="glow"></div>
  <div id="glow2"></div>
  <canvas id="cv"></canvas>
  <div id="noise"></div>
  <div id="greek"></div>

  <div class="page">

    <header>
      <a href="index.html" class="back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        volver
      </a>
      <a href="index.html" class="wm">
        <span class="wm-n">nira</span><span class="wm-l">l</span><span class="wm-a">a</span><span class="wm-b">b</span><span class="wm-s">s</span>
      </a>
      <div class="badge-live">
        <div class="dot" id="dot"></div>
        en vivo
      </div>
    </header>

    <div class="mid">
      <p class="eyebrow">nira radio</p>
      <div id="sName"></div>
      <p id="sTagline"></p>
      <div class="embed" id="embedWrap">
        <iframe id="sFr" src="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
      </div>
    </div>

    <div>
      <div class="sel">
        <button class="btn" data-s="alpha"><span class="g">α</span> Alpha</button>
        <button class="btn" data-s="theta"><span class="g">θ</span> Theta</button>
        <button class="btn" data-s="delta"><span class="g">δ</span> Delta</button>
      </div>
      <p id="freqLabel">sintoniza tu estado</p>
    </div>

  </div>

  <script>
  /* ── Datos ──────────────────────────────────────────── */
  const S = {
    alpha: { name:'Alpha', tagline:'Foco profundo. Para cuando construyes algo que importa.', greek:'α', color:'#00D4FF', freq:'440 hz — focus', list:'37i9dQZF1DWZeKCadgRdKQ' },
    theta: { name:'Theta', tagline:'Flujo creativo. Las ideas emergen cuando la mente viaja.',  greek:'θ', color:'#A78BFA', freq:'528 hz — create', list:'37i9dQZF1DWXLeA8Omikj7' },
    delta: { name:'Delta', tagline:'Descanso activo. El cerebro también procesa en silencio.',  greek:'δ', color:'#34D399', freq:'174 hz — rest',   list:'37i9dQZF1DX4sWSpwq3LiO' }
  };

  let cur = null;
  let waveCol = '#00D4FF';
  const nameEl  = document.getElementById('sName');
  const tagEl   = document.getElementById('sTagline');
  const wrap    = document.getElementById('embedWrap');
  const fr      = document.getElementById('sFr');
  const greekEl = document.getElementById('greek');
  const dot     = document.getElementById('dot');
  const freqLbl = document.getElementById('freqLabel');

  nameEl.style.transition = tagEl.style.transition = 'opacity .22s ease';

  function go(key) {
    if (key === cur) return;
    cur = key;
    const s = S[key];

    document.body.dataset.s  = key;
    dot.style.background     = s.color;
    waveCol                  = s.color;
    greekEl.textContent      = s.greek;
    greekEl.style.color      = s.color;
    greekEl.classList.add('show');

    nameEl.style.opacity = tagEl.style.opacity = '0';
    setTimeout(() => {
      nameEl.textContent = s.name;
      tagEl.textContent  = s.tagline;
      nameEl.style.opacity = tagEl.style.opacity = '1';
    }, 180);

    freqLbl.textContent  = s.freq;
    freqLbl.style.color  = s.color.replace(')', ',.3)').replace('rgb','rgba');

    wrap.classList.remove('on');
    setTimeout(() => {
      fr.src = `https://open.spotify.com/embed/playlist/${s.list}?utm_source=generator&theme=0`;
      wrap.classList.add('on');
    }, 300);

    document.querySelectorAll('.btn').forEach(b => {
      b.classList.remove('on');
      if (b.dataset.s === key) b.classList.add('on');
    });
  }

  document.querySelectorAll('.btn').forEach(b =>
    b.addEventListener('click', () => go(b.dataset.s))
  );
  go('alpha');

  /* ── Canvas olas ─────────────────────────────────── */
  const cv  = document.getElementById('cv');
  const ctx = cv.getContext('2d');
  let W, H, t = 0;

  function resize() { W = cv.width = innerWidth; H = cv.height = innerHeight; }
  addEventListener('resize', resize); resize();

  function rgb(h) { return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)]; }

  (function draw() {
    ctx.clearRect(0,0,W,H);
    const [r,g,b] = rgb(waveCol);

    for (let l = 0; l < 6; l++) {
      const amp   = H * .038 * (1 - l * .13);
      const freq  = .0036 + l * .0013;
      const spd   = .5 + l * .25;
      const yBase = H * .66 + l * 15;
      const a     = .052 - l * .007;

      ctx.beginPath(); ctx.moveTo(0, yBase);
      for (let x = 0; x <= W; x += 4) {
        const y = yBase
          + Math.sin(x * freq + t * spd) * amp
          + Math.sin(x * freq * 1.9 + t * spd * .65) * (amp * .32);
        ctx.lineTo(x, y);
      }
      ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath();
      ctx.fillStyle = `rgba(${r},${g},${b},${a})`; ctx.fill();

      ctx.beginPath(); ctx.moveTo(0, yBase);
      for (let x = 0; x <= W; x += 4) {
        const y = yBase
          + Math.sin(x * freq + t * spd) * amp
          + Math.sin(x * freq * 1.9 + t * spd * .65) * (amp * .32);
        ctx.lineTo(x, y);
      }
      ctx.strokeStyle = `rgba(${r},${g},${b},${a * 3})`; ctx.lineWidth = 1; ctx.stroke();
    }

    t += .010;
    requestAnimationFrame(draw);
  })();
  </script>
</body>
</html>
