<svg width="280" height="64" viewBox="0 0 280 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- N Mark -->
  <g transform="translate(0, 4)">
    <!-- Left bar -->
    <rect x="0" y="0" width="7" height="56" rx="1.5" fill="#0D1B2A"/>
    <!-- Diagonal accent (teal) -->
    <polygon points="7,0 14,0 21,56 14,56" fill="#4ECDC4"/>
    <!-- Right bar -->
    <rect x="21" y="0" width="7" height="56" rx="1.5" fill="#0D1B2A"/>
  </g>

  <!-- Divider -->
  <rect x="46" y="14" width="1" height="36" rx="0.5" fill="#CBD5E1"/>

  <!-- NIRA wordmark -->
  <text x="56" y="40"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="24" font-weight="700" fill="#0D1B2A" letter-spacing="3">NIRA</text>

  <!-- LABS wordmark -->
  <text x="132" y="40"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="24" font-weight="300" fill="#0D1B2A" letter-spacing="4">LABS</text>

  <!-- Tagline -->
  <text x="57" y="56"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="8.5" font-weight="500" fill="#4ECDC4" letter-spacing="5">BE ONE</text>
</svg>
